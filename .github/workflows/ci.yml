name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build -c Release

      - name: Test
        run: dotnet test -c Release --no-build

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish single-file EXE
        run: ./publish.ps1 -SkipTests

      - name: Run self-test on published EXE
        run: |
          $p = Start-Process -FilePath dist/QwertzBridge.exe -ArgumentList '--selftest' -PassThru -Wait -NoNewWindow
          if ($p.ExitCode -ne 0) { throw "Self-test failed with exit code $($p.ExitCode)" }

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/QwertzBridge.exe
          generate_release_notes: true
